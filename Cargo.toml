[ workspace ]
members = [
	"./crates/app",
	"./crates/configuration",
	"./crates/localization",
	"./crates/platform",
	"./crates/settings",
	"./crates/start",
	"./crates/shell_dll",
	"./crates/injector"
]
resolver = "3"


[ workspace.package ]
edition = "2024"
rust-version = "1.93.0"
authors = [ "Ep" ]
license = "MIT"


[ workspace.dependencies ]
configuration = { path = "./crates/configuration" }
localization = { path = "./crates/localization" }
platform = { path = "./crates/platform" }
settings = { path = "./crates/settings" }
start = { path = "./crates/start" }
crate-injector = { package = "injector", path = "./crates/injector" }
shell-dll = { package = "shell_dll", path = "./crates/shell_dll" }

serde_json = "1.0.150"
serde = { version = "1.0.228", features = [ "derive" ] }
windows = { version = "0.62.2", features = [ "Foundation_Numerics", "Graphics_Capture", "Graphics_DirectX", "Graphics_DirectX_Direct3D11", "Win32_Foundation", "Win32_Globalization", "Win32_Graphics_Direct2D", "Win32_Graphics_Direct2D_Common", "Win32_Graphics_Direct3D", "Win32_Graphics_Direct3D11", "Win32_Graphics_DirectComposition", "Win32_Graphics_DirectWrite", "Win32_Graphics_Dwm", "Win32_Graphics_Dxgi", "Win32_Graphics_Dxgi_Common", "Win32_Graphics_Gdi", "Win32_Security", "Win32_System_Com", "Win32_System_Diagnostics_Debug", "Win32_System_Diagnostics_ToolHelp", "Win32_System_LibraryLoader", "Win32_System_Memory", "Win32_System_Ole", "Win32_System_Registry", "Win32_System_SystemServices", "Win32_System_Threading", "Win32_System_Variant", "Win32_System_WinRT", "Win32_System_WinRT_Direct3D11", "Win32_System_WinRT_Graphics_Capture", "Win32_UI_Accessibility", "Win32_UI_Controls", "Win32_UI_HiDpi", "Win32_UI_Input_KeyboardAndMouse", "Win32_UI_Shell", "Win32_UI_WindowsAndMessaging" ] }
windows-numerics = "0.3.1"

